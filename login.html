<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | URLGuard AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <div class="auth-shell">
    <div>
      <a class="back-link" href="index.html">← Back to Home</a>
      <h1>Welcome back</h1>
      <p>Sign in to access your attack monitoring dashboard.</p>
    </div>
    <form class="auth-card">
      <label>Email
        <input type="email" placeholder="security.analyst@company.com" required>
      </label>
      <label>Password
        <input type="password" placeholder="••••••••" required>
      </label>
      <button type="submit" class="btn btn-primary">Login</button>
      <p class="small">Don't have an account? <a href="signup.html">Sign up</a></p>
    </form>
  </div>
</body>
</html>
