<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | URLGuard AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <div class="auth-shell">
    <div>
      <a class="back-link" href="index.html">← Back to Home</a>
      <h1>Create your workspace</h1>
      <p>Start detecting URL-based cyber attacks with one secure account.</p>
    </div>
    <form class="auth-card">
      <label>Organization
        <input type="text" placeholder="Defense SOC Lab" required>
      </label>
      <label>Email
        <input type="email" placeholder="admin@org.com" required>
      </label>
      <label>Password
        <input type="password" placeholder="Create a strong password" required>
      </label>
      <button type="submit" class="btn btn-primary">Create Account</button>
      <p class="small">Already registered? <a href="login.html">Login</a></p>
    </form>
  </div>
</body>
</html>
